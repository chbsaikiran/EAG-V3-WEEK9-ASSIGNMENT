# Session 8 skills catalogue.
#
# Each entry below names one skill (the node "type" the orchestrator can
# run). The two files that define a skill are this yaml entry and the
# referenced `prompt:` markdown — there is no Python class per skill.
#
# Fields:
#   prompt              path to the system prompt, relative to S8/code/
#   description         one-line summary (shown in dashboards / replay)
#   provider_pin        OPTIONAL preferred provider; overridden by
#                       agent_routing.yaml in the gateway if set there.
#                       Most pins live in the gateway side, not here.
#   tools_allowed       which MCP tools this skill may call. Empty list
#                       means the skill is text-only and never calls a
#                       tool through the gateway's tool-use channel.
#   internal_successors STATIC graph extension. Whenever this skill
#                       finishes, the orchestrator adds these skills as
#                       successor nodes regardless of what the skill
#                       itself emitted in AgentResult.successors. Used
#                       by Coder → SandboxExecutor.
#   critic              When true, the orchestrator inserts a Critic
#                       node on every outgoing edge from this skill.
#                       Used by Distiller.
#
# Anything declared under `metadata:` is opaque to the orchestrator; the
# skill is free to interpret its own metadata however it wants.

planner:
  prompt: prompts/planner.md
  tools_allowed: []
  temperature: 0.4         # decompositions need a little breathing room
  max_tokens: 1500
  description: Decomposes user queries into the initial DAG and synthesises recovery subgraphs on node failure.

retriever:
  prompt: prompts/retriever.md
  tools_allowed: [search_knowledge]
  temperature: 0.2         # retrieval is mostly deterministic
  max_tokens: 1200
  description: Searches Memory and the FAISS index for material relevant to a query.

researcher:
  prompt: prompts/researcher.md
  tools_allowed: [web_search, fetch_url]
  temperature: 0.7         # exploratory; let the model choose phrasings
  max_tokens: 2500
  description: Performs multi-step web research and produces normalised text outputs.

distiller:
  prompt: prompts/distiller.md
  critic: true
  temperature: 0.1         # extraction; almost-zero
  max_tokens: 1200
  description: Extracts structured fields from raw text or page content.

summariser:
  prompt: prompts/summariser.md
  temperature: 0.3
  max_tokens: 1200
  description: Condenses long content into a short form.

critic:
  prompt: prompts/critic.md
  temperature: 0.0         # pass/fail; we want determinism
  max_tokens: 500
  description: Evaluates an upstream node's output; emits pass or fail with rationale.

formatter:
  prompt: prompts/formatter.md
  temperature: 0.3
  max_tokens: 1500
  description: Renders the final answer for the user. Conventional terminal node — its output.final_answer is what the executor returns.

sandbox_executor:
  prompt: prompts/sandbox_executor.md
  temperature: 0.0
  max_tokens: 400
  description: Runs code from a Coder node in the sandbox and returns stdout, stderr, exit code, and any generated files.

coder:
  prompt: prompts/coder.md
  internal_successors: [sandbox_executor]
  temperature: 0.2
  max_tokens: 1500
  description: STUB. Student assignment for Session 8. Emits Python code; the orchestrator hands it to sandbox_executor next.

browser:
  prompt: prompts/browser.md
  # The Browser skill does not go through the standard LLM-call dispatch.
  # It owns its own cascade (HTML extract → a11y text → vision SoM) and
  # routes each layer's gateway call internally. temperature / max_tokens
  # are kept here for registry uniformity but the dispatcher ignores them.
  temperature: 0.0
  max_tokens: 1024
  description: |
    Fetches and interacts with web pages through a four-layer cascade
    (extract, deterministic, a11y, vision). Inputs in metadata: url
    (required) and goal (required). Returns BrowserOutput with the
    chosen layer surfaced as output.path. Use when Researcher's
    fetch_url is insufficient: JavaScript-rendered content, interactive
    widgets, multi-page workflows.

cua_hotkey:
  prompt: prompts/cua_hotkey.md
  # Layer 2a — zero LLM calls at runtime. The skill dispatches osascript
  # keystrokes deterministically and reads the result from the AX tree.
  # temperature / max_tokens are unused by the dispatcher for this skill.
  temperature: 0.0
  max_tokens: 256
  description: |
    Drives any macOS application using deterministic hotkey sequences
    (osascript). Zero LLM calls at runtime — Layer 2a.
    metadata MUST set:
      app_name (str)  — macOS app name, e.g. "Calculator"
      steps    (list) — ordered list of action dicts:
          {"action": "keystroke", "value": "<text>"}
          {"action": "key",       "value": "<name>", "modifiers": [...]}
          {"action": "key_combo", "value": "<char>", "modifiers": [...]}
          {"action": "delay",     "value": <seconds>}
    metadata MAY set:
      read_ax (str)   — AppleScript AX path to read result after steps,
                        e.g. "value of static text 1 of window 1"
    Use for: Calculator arithmetic, TextEdit, any app where the exact
    key sequence is known in advance and no visual inspection is needed.

cua_electron:
  prompt: prompts/cua_electron.md
  # Electron page path — connects via CDP remote debugging and drives the
  # app through a multi-turn LLM loop reading the AX tree each turn.
  # The LLM loop runs inside the skill; this entry is for registry and
  # planner-prompt purposes only.
  temperature: 0.0
  max_tokens: 256
  description: |
    Drives any Electron desktop app (Antigravity IDE, VS Code, Slack …)
    via Playwright CDP remote debugging. Launches the app with
    --remote-debugging-port, reads the page accessibility tree each
    turn, and uses the LLM gateway to decide the next action.
    metadata MUST set:
      goal (str)       — what to accomplish, e.g.
                         "open new file, type hello world, save with Cmd+S"
    metadata MAY set:
      app_path (str)   — Electron binary path; defaults to Antigravity IDE
      debug_port (int) — CDP port; default 9222
      workspace (str)  — folder to open in the editor
      max_steps (int)  — LLM turn cap; default 12
    Use for: editing files in Antigravity/VS Code, Slack message drafting,
    any task inside an Electron app where DOM-level access is needed.

cua_game:
  prompt: prompts/cua_game.md
  # Layer 3 pure-vision skill for canvas-rendered browser games. Layers 1
  # (trafilatura) and 2b (AX tree) return nothing useful for canvas games,
  # so this skill bypasses the cascade entirely and goes straight to vision.
  # The multi-turn vision loop runs inside the skill.
  temperature: 0.0
  max_tokens: 256
  description: |
    Plays a canvas-rendered browser game using Layer 3 pure vision.
    Takes raw screenshots each turn and uses the vision LLM to decide
    keyboard moves. No SoM annotation needed — canvas has no interactive
    DOM elements to mark.
    metadata MUST set:
      url  (str)  — game URL, e.g. "https://play2048.co/"
      goal (str)  — what to accomplish, e.g.
                    "play 2048 for 10 moves and report the highest tile"
    metadata MAY set:
      max_turns    (int)  — move budget; default 10
      keys         (list) — allowed key names; default
                            ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"]
      click_x/y    (int)  — pixel to click for keyboard focus; default 300,350
      provider_pin (str)  — vision provider, e.g. "gemini"
    Use for: 2048, Snake, Tetris, Flappy Bird clones, Minesweeper, any
    browser game whose state is only visible in a screenshot (canvas/WebGL,
    no ARIA on game elements).
